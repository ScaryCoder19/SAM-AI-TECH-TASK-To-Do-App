<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f1e8">
  <title>Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app-shell">
    <section class="app-card" aria-label="Task list">
      <header class="app-header">
        <div>
          <p class="eyebrow">Task list</p>
          <h1>Tasks</h1>
        </div>
        <p class="subtitle" id="count">0 open items</p>
      </header>

      <form id="task-form" class="task-form">
        <label class="sr-only" for="task-input">New task</label>
        <input
          type="text"
          id="task-input"
          placeholder="Add a task"
          autocomplete="off"
          maxlength="120"
        >
        <button type="submit">Add</button>
      </form>

      <ul id="task-list" class="task-list"></ul>

      <p id="empty-msg" class="empty-state">No tasks yet.</p>

      <footer class="footer">
        <button id="clear-done" type="button">Clear completed</button>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
